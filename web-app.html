<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RatioResizer — Web</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1e1e2e;
    --surface:   #2a2a3e;
    --surface2:  #32324a;
    --border:    #3d3d5c;
    --accent:    #2e84ff;
    --accent-dim:#1a4fa8;
    --text:      #e2e2f0;
    --text-dim:  #888aaa;
    --success:   #3ddc84;
    --danger:    #ff5c5c;
    --radius:    10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header .logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #fff;
    font-weight: 700;
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p { font-size: 12px; color: var(--text-dim); margin-top: 1px; }

  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 7px;
    display: block;
  }

  .seg-control {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 3px;
    gap: 3px;
  }
  .seg-control button {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    padding: 7px 0;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .seg-control button.active { background: var(--accent); color: #fff; }
  .seg-control button:not(.active):hover { background: var(--border); color: var(--text); }

  .dim-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }
  .dim-field { flex: 1; }
  .dim-link {
    color: var(--text-dim);
    font-size: 20px;
    padding-bottom: 9px;
    user-select: none;
  }

  .input-wrap { position: relative; }
  .input-wrap .unit {
    position: absolute;
    right: 11px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--text-dim);
    pointer-events: none;
  }
  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    padding: 9px 36px 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  input::-webkit-inner-spin-button, input::-webkit-outer-spin-button { -webkit-appearance: none; }
  input:focus { border-color: var(--accent); }

  .ratio-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .ratio-row .input-wrap { flex: 1; }

  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 9px;
  }
  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .preset-btn:hover { background: var(--border); color: var(--text); border-color: var(--accent); }
  .preset-btn.active { background: var(--accent-dim); border-color: var(--accent); color: #fff; }

  hr { border: none; border-top: 1px solid var(--border); }

  /* Visual canvas preview */
  .canvas-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .canvas-rect {
    background: rgba(46, 132, 255, 0.15);
    border: 2px solid rgba(46, 132, 255, 0.8);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: rgba(46, 132, 255, 0.9);
    font-weight: 600;
    transition: width 0.2s ease, height 0.2s ease;
    min-width: 20px;
    min-height: 20px;
    max-width: 90%;
    max-height: 90%;
  }

  /* Layer name tag */
  .layer-name-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .layer-name-tag .tag-icon { font-size: 16px; color: var(--text-dim); }
  .layer-name-tag .tag-text { flex: 1; min-width: 0; }
  .layer-name-tag .tag-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
  .layer-name-tag .tag-value { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .layer-name-tag .tag-value.empty { color: var(--text-dim); font-weight: 400; }

  /* CSS Snippet */
  .css-block {
    background: #0f0f1a;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    font-size: 12px;
    line-height: 1.7;
    position: relative;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .css-block:hover { border-color: var(--accent); }
  .css-block.copied { border-color: var(--success); }
  .css-block .copy-badge {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.6;
    font-family: -apple-system, sans-serif;
  }
  .kw { color: #c792ea; }
  .prop { color: #89ddff; }
  .val { color: #c3e88d; }
  .cmt { color: #546e7a; }

  /* Actions */
  .actions { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 11px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { background: var(--border); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 13px;
    white-space: nowrap;
    opacity: 0;
    transition: transform 0.2s, opacity 0.2s;
    z-index: 999;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo">⇄</div>
    <div>
      <h1>RatioResizer</h1>
      <p>Lock a side. Set a ratio. Done.</p>
    </div>
  </div>

  <hr />

  <!-- Anchor -->
  <div>
    <span class="label">Anchor Side</span>
    <div class="seg-control">
      <button id="anchor-w" class="active" onclick="setAnchor('width')">⬌ Width</button>
      <button id="anchor-h" onclick="setAnchor('height')">⬍ Height</button>
    </div>
  </div>

  <!-- Dimensions -->
  <div>
    <span class="label">Dimensions</span>
    <div class="dim-row">
      <div class="dim-field">
        <div class="input-wrap">
          <input type="number" id="input-w" placeholder="Width" min="1" step="1" oninput="onDimInput('width')" />
          <span class="unit">px</span>
        </div>
      </div>
      <div class="dim-link">⇄</div>
      <div class="dim-field">
        <div class="input-wrap">
          <input type="number" id="input-h" placeholder="Height" min="1" step="1" oninput="onDimInput('height')" />
          <span class="unit">px</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Ratio -->
  <div>
    <span class="label">Aspect Ratio</span>
    <div class="ratio-row">
      <div class="input-wrap">
        <input type="text" id="input-ratio" placeholder="e.g. 16:9 or 1.618" oninput="onRatioInput()" />
      </div>
    </div>
    <div class="presets">
      <button class="preset-btn" onclick="applyPreset('1:1')">1:1</button>
      <button class="preset-btn" onclick="applyPreset('4:3')">4:3</button>
      <button class="preset-btn" onclick="applyPreset('3:2')">3:2</button>
      <button class="preset-btn" onclick="applyPreset('16:9')">16:9</button>
      <button class="preset-btn" onclick="applyPreset('21:9')">21:9</button>
      <button class="preset-btn" onclick="applyPreset('9:16')">9:16</button>
      <button class="preset-btn" onclick="applyPreset('1.618')">φ Golden</button>
      <button class="preset-btn" onclick="applyPreset('1.4142')">√2 A-series</button>
    </div>
  </div>

  <hr />

  <!-- Visual Canvas Preview -->
  <div>
    <span class="label">Preview</span>
    <div class="canvas-area" id="canvas-area">
      <div class="canvas-rect" id="canvas-rect" style="width:60px;height:60px">—</div>
    </div>
  </div>

  <!-- Layer Name Tag -->
  <div class="layer-name-tag">
    <div class="tag-icon">🏷</div>
    <div class="tag-text">
      <div class="tag-label">Figma Layer Name</div>
      <div class="tag-value empty" id="layer-name-display">Enter dimensions and a ratio above</div>
    </div>
  </div>

  <!-- CSS Snippet -->
  <div>
    <span class="label">CSS Output <span style="color:var(--text-dim);font-size:10px;text-transform:none;letter-spacing:0;font-weight:400;">— click to copy</span></span>
    <div class="css-block" id="css-block" onclick="copyCss()">
      <span class="copy-badge" id="copy-badge">copy</span>
      <div id="css-output"><span style="color:var(--text-dim)">/* Set dimensions and a ratio to see output */</span></div>
    </div>
  </div>

  <hr />

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" onclick="downloadValues()">⬇ Copy Values</button>
    <button class="btn btn-secondary" onclick="resetAll()">↺ Reset</button>
  </div>

</div>

<div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────
  let state = {
    anchor: 'width',
    width: null,
    height: null,
    ratio: null,
    ratioStr: '',
  };

  // ── Ratio Parsing ──────────────────────────────────────────────────
  function parseRatio(str) {
    const t = str.trim();
    const c = t.match(/^(\d+(?:\.\d+)?)\s*:\s*(\d+(?:\.\d+)?)$/);
    if (c) { const b = parseFloat(c[2]); return b === 0 ? null : parseFloat(c[1]) / b; }
    const d = parseFloat(t);
    return (!isNaN(d) && d > 0) ? d : null;
  }

  function round2(v) { return Math.round(v * 100) / 100; }

  function canonicalRatio(str) {
    const c = str.trim().match(/^(\d+(?:\.\d+)?)\s*:\s*(\d+(?:\.\d+)?)$/);
    return c ? `${c[1]}:${c[2]}` : str.trim();
  }

  // ── Anchor ─────────────────────────────────────────────────────────
  function setAnchor(side) {
    state.anchor = side;
    document.getElementById('anchor-w').classList.toggle('active', side === 'width');
    document.getElementById('anchor-h').classList.toggle('active', side === 'height');
    syncDimensions();
  }

  // ── Sync ───────────────────────────────────────────────────────────
  function syncDimensions() {
    const r = state.ratio;
    if (!r) { updateUI(); return; }
    if (state.anchor === 'width' && state.width != null) {
      state.height = round2(state.width / r);
      setVal('input-h', state.height);
    } else if (state.anchor === 'height' && state.height != null) {
      state.width = round2(state.height * r);
      setVal('input-w', state.width);
    }
    updateUI();
  }

  function setVal(id, val) {
    const el = document.getElementById(id);
    if (document.activeElement !== el) el.value = val != null ? val : '';
  }

  // ── Input Handlers ─────────────────────────────────────────────────
  function onDimInput(side) {
    const id = side === 'width' ? 'input-w' : 'input-h';
    const v = parseFloat(document.getElementById(id).value);
    if (side === 'width') state.width = isNaN(v) ? null : v;
    else state.height = isNaN(v) ? null : v;
    if (state.anchor !== side) setAnchor(side);
    else syncDimensions();
  }

  function onRatioInput() {
    const raw = document.getElementById('input-ratio').value;
    state.ratioStr = raw;
    state.ratio = parseRatio(raw);
    updatePresetHighlight(raw.trim());
    syncDimensions();
  }

  // ── Presets ────────────────────────────────────────────────────────
  function applyPreset(str) {
    document.getElementById('input-ratio').value = str;
    state.ratioStr = str;
    state.ratio = parseRatio(str);
    updatePresetHighlight(str);
    syncDimensions();
  }

  function updatePresetHighlight(str) {
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('active',
        b.textContent.startsWith(str) || (b.textContent.startsWith('φ') && str === '1.618') ||
        (b.textContent.startsWith('√') && str === '1.4142')
      );
    });
  }

  // ── UI Update ──────────────────────────────────────────────────────
  function updateUI() {
    const w = state.width;
    const h = state.height;
    const valid = w > 0 && h > 0 && state.ratio > 0;

    updateCanvasPreview(w, h, valid);
    updateLayerName(w, h, valid);
    updateCssBlock(w, h, valid);
  }

  // Canvas visual preview
  function updateCanvasPreview(w, h, valid) {
    const area = document.getElementById('canvas-area');
    const rect = document.getElementById('canvas-rect');
    const maxW = area.clientWidth * 0.85;
    const maxH = area.clientHeight * 0.85;

    if (!valid) {
      rect.style.width = '60px';
      rect.style.height = '60px';
      rect.textContent = '—';
      return;
    }

    // Scale to fit preview area
    const scaleW = maxW / w;
    const scaleH = maxH / h;
    const scale = Math.min(scaleW, scaleH, 1);
    const dw = Math.max(20, Math.round(w * scale));
    const dh = Math.max(20, Math.round(h * scale));

    rect.style.width = dw + 'px';
    rect.style.height = dh + 'px';
    rect.textContent = `${w} × ${h}`;
  }

  // Layer name tag
  function updateLayerName(w, h, valid) {
    const el = document.getElementById('layer-name-display');
    if (!valid) {
      el.textContent = 'Enter dimensions and a ratio above';
      el.classList.add('empty');
      return;
    }
    const displayRatio = canonicalRatio(state.ratioStr);
    el.textContent = `Rectangle | ${displayRatio} (${w}x${h})`;
    el.classList.remove('empty');
  }

  // CSS block
  function updateCssBlock(w, h, valid) {
    const out = document.getElementById('css-output');
    if (!valid) {
      out.innerHTML = '<span style="color:var(--text-dim)">/* Set dimensions and a ratio to see output */</span>';
      return;
    }
    out.innerHTML =
      `<span class="cmt">/* Aspect Ratio */</span>\n` +
      `<span class="prop">aspect-ratio</span>: <span class="val">${w} / ${h}</span>;\n\n` +
      `<span class="cmt">/* Explicit dimensions */</span>\n` +
      `<span class="prop">width</span>: <span class="val">${w}px</span>;\n` +
      `<span class="prop">height</span>: <span class="val">${h}px</span>;\n\n` +
      `<span class="cmt">/* Ratio as decimal */</span>\n` +
      `<span class="cmt">/* ${round2(w/h)} : 1 */</span>`;
  }

  // ── Copy CSS ───────────────────────────────────────────────────────
  let copyTimer;
  function copyCss() {
    const w = state.width; const h = state.height;
    if (!w || !h) return;
    const text = `aspect-ratio: ${w} / ${h};\nwidth: ${w}px;\nheight: ${h}px;`;
    navigator.clipboard.writeText(text).then(() => {
      const block = document.getElementById('css-block');
      const badge = document.getElementById('copy-badge');
      block.classList.add('copied');
      badge.textContent = 'copied!';
      clearTimeout(copyTimer);
      copyTimer = setTimeout(() => {
        block.classList.remove('copied');
        badge.textContent = 'copy';
      }, 1400);
    });
  }

  // ── Download / Copy summary ────────────────────────────────────────
  function downloadValues() {
    const w = state.width; const h = state.height;
    if (!w || !h) { showToast('Nothing to copy yet', 'error'); return; }
    const displayRatio = canonicalRatio(state.ratioStr);
    const text =
      `RatioResizer Output\n` +
      `───────────────────\n` +
      `Ratio:  ${displayRatio}\n` +
      `Width:  ${w}px\n` +
      `Height: ${h}px\n` +
      `Layer:  Rectangle | ${displayRatio} (${w}x${h})\n\n` +
      `CSS:\n` +
      `aspect-ratio: ${w} / ${h};\n` +
      `width: ${w}px;\n` +
      `height: ${h}px;`;
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!', 'success'));
  }

  // ── Reset ──────────────────────────────────────────────────────────
  function resetAll() {
    state = { anchor: 'width', width: null, height: null, ratio: null, ratioStr: '' };
    ['input-w', 'input-h', 'input-ratio'].forEach(id => document.getElementById(id).value = '');
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    setAnchor('width');
    updateUI();
    showToast('Reset', '');
  }

  // ── Toast ──────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 2200);
  }

  // Init
  updateUI();
</script>
</body>
</html>
